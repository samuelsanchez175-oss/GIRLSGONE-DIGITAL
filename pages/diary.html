<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diary – Girls Gone Digital</title>
  <style>
    :root {
      --ice-header-h: 28px;
      --ice-announce-h: 26px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
      background: #ffffff;
      color: #111;
      line-height: 1.4;
      padding-top: var(--ice-header-h);
    }

    .skip-to-content-link {
      position: absolute;
      left: -9999px;
      z-index: 999;
    }
    .skip-to-content-link:focus {
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      background: #000;
      color: #fff;
    }

    .custom-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--ice-header-h);
    }

    .custom-header-bar {
      background: #ffffff;
      width: 100%;
      height: var(--ice-header-h);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1.5rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .custom-header-left,
    .custom-header-right {
      display: flex;
      align-items: center;
      flex: 1;
    }

    .custom-header-right {
      justify-content: flex-end;
    }

    .custom-header-nav ul {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .custom-header-nav a,
    .custom-header-cart-toggle {
      text-decoration: none;
      color: #000000;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.02em;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      height: var(--ice-header-h);
    }

    .custom-header-nav a:hover,
    .custom-header-cart-toggle:hover {
      opacity: 0.6;
    }

    .custom-header-logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      height: var(--ice-header-h);
    }

    .custom-header-logo img {
      height: 24px;
      width: auto;
      display: block;
    }

    .custom-header-cart-toggle {
      border: none;
      padding: 0;
      font-family: inherit;
    }

    main {
      min-height: calc(100vh - var(--ice-header-h));
    }

    .diary-flip {
      width: 100%;
      background: #ffffff;
    }

    .diary-flip__viewport {
      height: calc(100vh - var(--ice-header-h));
      position: relative;
      overflow: hidden;
    }

    .diary-flip__slide {
      position: absolute;
      inset: 0;
      padding: 32px;
      opacity: 0;
      transition: opacity 180ms linear;
      pointer-events: none;
    }

    .diary-flip__slide.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .diary-flip__pair {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .diary-flip__frame {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .diary-flip__img {
      width: 75%;
      height: 75%;
      object-fit: contain;
      display: block;
    }

    .diary-flip__zone {
      position: absolute;
      top: 0;
      height: 100%;
      width: 40%;
      border: 0;
      background: transparent;
      z-index: 10;
      cursor: pointer;
    }

    .diary-flip__zone--prev { left: 0; }
    .diary-flip__zone--next { right: 0; }

    @media (max-width: 749px) {
      .custom-header-bar {
        padding: 0 0.75rem;
      }

      .diary-flip__slide {
        padding: 16px;
      }

      .diary-flip__pair {
        grid-template-columns: 1fr;
        gap: 12px;
        align-content: center;
        margin-top: 10vh;
      }

      .diary-flip__frame {
        height: calc((100vh - var(--ice-header-h) - 32px - 12px) / 2);
        min-height: 240px;
      }

      .diary-flip__img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .diary-flip__zone {
        width: 50%;
      }
    }

    .ice-footer {
      width: 100%;
      background: #ffffff;
      padding: 14px 1rem;
      color: #111;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    .ice-footer-inner {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .ice-footer-links {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 11px;
      line-height: 1.2;
    }

    .ice-footer-links a {
      text-decoration: none;
      color: #111;
    }

    .ice-footer-links a:hover {
      opacity: 0.6;
    }

    .ice-footer-copy {
      font-size: 11px;
      color: #111;
      white-space: nowrap;
      padding-bottom: 1px;
    }

    @media (max-width: 768px) {
      .ice-footer-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }
  </style>
  <link rel="stylesheet" href="../assets/mobile-nav.css">
</head>
<body>
  <a class="skip-to-content-link" href="#MainContent">Skip to content</a>

        <nav class="custom-header-nav">
          <ul>
            <li><a href="magazine.html#digital-girl">Digital Girl of the Month</a></li>
            <li><a href="../girls gone digital.html">Home</a></li>

        </nav>
      </div>

          <div class="diary-flip__pair">
            <div class="diary-flip__frame">
              <img
                src="https://icestudios.shop/cdn/shop/files/Screenshot2026-02-26at12.21.13PM.png?v=1772130085&width=1200"
                alt=""
                class="diary-flip__img"
                loading="lazy"

            </div>
            <div class="diary-flip__frame">
              <img
                src="https://icestudios.shop/cdn/shop/files/Screenshot2026-02-26at12.22.27PM.png?v=1772130162&width=1200"
                alt=""
                class="diary-flip__img"

        </div>

        <div class="diary-flip__slide">
          <div class="diary-flip__pair">
            <div class="diary-flip__frame">
              <img
                src="https://icestudios.shop/cdn/shop/files/preview_images/db93770f245b456ebf7ee67de7dd0305.thumbnail.0000000000_small.jpg?v=1756749449"

  </footer>

  <script>
    (function() {
      const root = document.querySelector('.diary-flip');
      if (!root) return;

      const slides = Array.from(root.querySelectorAll('.diary-flip__slide'));
      const prevZone = root.querySelector('.diary-flip__zone--prev');
      const nextZone = root.querySelector('.diary-flip__zone--next');

      let index = 0;

      function render() {
        slides.forEach((s, i) => s.classList.toggle('is-active', i === index));
      }

      function prev() {
        index = Math.max(0, index - 1);
        render();
      }

      function next() {
        index = Math.min(slides.length - 1, index + 1);
        render();
      }

      if (prevZone) prevZone.addEventListener('click', prev);
      if (nextZone) nextZone.addEventListener('click', next);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') prev();
        if (e.key === 'ArrowRight') next();
      });
    })();
  </script>
  <script src="../assets/mobile-nav.js"></script>
  <script src="../assets/cart.js"></script>
