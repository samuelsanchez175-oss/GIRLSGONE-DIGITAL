<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>GIRLS GONE DIGITAL (ZINE) – Issue 1 Mar 2025 – Girls Gone Digital</title>
  <!-- Product: ZINE, $25, carousel -->
  <style>
    :root { --ice-header-h: 28px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
      background: #f8e8f0;
      color: #111;
      padding-top: var(--ice-header-h);
    }
    .custom-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: var(--ice-header-h);
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1.5rem;
    }
    .custom-header-left, .custom-header-right { display: flex; align-items: center; flex: 1; }
    .custom-header-right { justify-content: flex-end; }
    .custom-header-nav ul { display: flex; gap: 1.5rem; list-style: none; }
    .custom-header-nav a, .custom-header-cart-toggle {
      text-decoration: none; color: #000; font-size: 11px; font-weight: 400;
      letter-spacing: 0.02em; background: none; cursor: pointer;
      display: flex; align-items: center; height: var(--ice-header-h);
    }
    .custom-header-nav a:hover, .custom-header-cart-toggle:hover { opacity: 0.6; }
    .custom-header-logo { position: absolute; left: 50%; transform: translateX(-50%); }
    .custom-header-logo img { height: 24px; }
    .custom-header-cart-toggle { border: none; padding: 0; font-family: inherit; }
    .product-section {
      padding: 0 0 2rem;
      max-width: 500px;
      margin: 0 auto;
      background: #f8e8f0;
    }
    .product-section .product-details { padding: 0 1rem; }
    .product-carousel {
      position: relative;
      width: 100vw;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      margin-bottom: 0;
      min-height: 70vh;
      display: flex;
      align-items: stretch;
      justify-content: flex-start;
      overflow: hidden;
      padding: 0;
    }
    .carousel-track {
      display: flex;
      width: 100%;
      transition: transform 0.3s ease;
    }
    .carousel-slide {
      flex: 0 0 100%;
      width: 100%;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      min-height: 70vh;
    }
    .carousel-slide.carousel-slide--full {
      min-height: 95vh;
    }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .carousel-prev,
    .carousel-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .carousel-prev:hover,
    .carousel-next:hover {
      background: rgba(0, 0, 0, 0.6);
    }
    .carousel-prev { left: 0.25rem; }
    .carousel-next { right: 0.25rem; }
    .carousel-dots {
      position: absolute;
      bottom: 0.75rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      z-index: 2;
    }
    .carousel-dots button {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.3);
      cursor: pointer;
      padding: 0;
    }
    .carousel-dots button.is-active {
      background: #111;
    }
    .product-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
    }
    .product-issue {
      font-size: 11px;
      font-weight: 400;
      color: #666;
      margin-bottom: 0.5rem;
    }
    .product-price { font-size: 12px; font-weight: 400; margin-bottom: 1rem; }
    .product-add-btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .product-add-btn:hover { opacity: 0.85; }
    .product-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      gap: 1rem;
    }
    .product-back { font-size: 11px; color: #666; text-decoration: none; }
    .product-back:hover { color: #111; }
    .ice-footer {
      width: 100%; background: #f8e8f0; padding: 14px 1rem;
      border-top: 1px solid rgba(0,0,0,0.06); font-size: 11px;
    }
    .ice-footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; gap: 0.5rem;
    }
    .ice-footer-links { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .ice-footer-links a { text-decoration: none; color: #111; }
    .ice-footer-links a:hover { opacity: 0.6; }
  </style>
  <link rel="stylesheet" href="../assets/mobile-nav.css">
  <link rel="stylesheet" href="../assets/iphone-mobile.css">
</head>
<body>
  <header class="custom-header">
    <div class="custom-header-left">
      <nav class="custom-header-nav">
        <ul>
          <li><a href="magazine.html">Magazine</a></li>
        </ul>
      </nav>
    </div>
    <a class="custom-header-logo" href="../girls gone digital.html">
      <img src="../assets/logo.png" alt="Girls Gone Digital">
    </a>
    <div class="custom-header-right">
      <nav class="custom-header-nav">
        <ul>
          <li><a href="shop.html">Shop now</a></li>
          <li><a href="../girls gone digital.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="events.html">Events</a></li>
          <li><button class="custom-header-cart-toggle" type="button" id="cartBtn">Cart <span id="cartCount">0</span></button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="product-section">
      <div class="product-carousel" id="productCarousel">
        <div class="carousel-track">
          <div class="carousel-slide"><img src="../assets/magazine-issue1-cover-v1.png" alt="GIRLS GONE DIGITAL Magazine Issue 1"></div>
          <div class="carousel-slide carousel-slide--full"><img src="../assets/magazine-issue1-cover-v2.png" alt="GIRLS GONE DIGITAL Magazine Issue 1 Mar 2025"></div>
        </div>
        <button type="button" class="carousel-prev" id="carouselPrev" aria-label="Previous image">‹</button>
        <button type="button" class="carousel-next" id="carouselNext" aria-label="Next image">›</button>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
      <div class="product-details">
        <h1 class="product-name">GIRLS GONE DIGITAL (ZINE)</h1>
        <div class="product-issue">Issue 1 — Mar 2025</div>
        <div class="product-price" id="magazinePrice">$25.00</div>
        <div class="product-actions">
          <button type="button" class="product-add-btn" id="addBtn" data-name="GIRLS GONE DIGITAL (ZINE) (Issue 1 Mar 2025)" data-price="25.00">Add to Cart</button>
          <a href="shop.html" class="product-back">← Back to Shop</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="ice-footer">
    <div class="ice-footer-inner">
      <div class="ice-footer-links">
        <span>Our Founder <a href="https://www.instagram.com/brandonalmengo/" target="_blank" rel="noopener">@brandonalmengo</a></span>
        <a href="mailto:Girlsgon.digital@gmail.com">Girlsgon.digital@gmail.com</a>
      </div>
      <div>© 2026 Girls Gone Digital</div>
    </div>
  </footer>
  <script>
    (function() {
      var KEY = 'ggdCart';
      function getCart() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
      function saveCart(c) { localStorage.setItem(KEY, JSON.stringify(c)); if (window.ggdCartRender) window.ggdCartRender(); }
      var btn = document.getElementById('addBtn');
      var name = btn.getAttribute('data-name');
      var price = btn.getAttribute('data-price');
      btn.addEventListener('click', function() {
        var c = getCart();
        var i = c.findIndex(function(x) { return x.name === name; });
        if (i >= 0) c[i].qty = (c[i].qty || 1) + 1;
        else c.push({ name: name, price: price, qty: 1 });
        saveCart(c);
        btn.textContent = 'Added';
        setTimeout(function() { btn.textContent = 'Add to Cart'; }, 800);
      });
    })();
    (function() {
      var track = document.querySelector('#productCarousel .carousel-track');
      var slides = document.querySelectorAll('#productCarousel .carousel-slide');
      var prevBtn = document.getElementById('carouselPrev');
      var nextBtn = document.getElementById('carouselNext');
      var dotsEl = document.getElementById('carouselDots');
      var current = 0;
      var total = slides.length;
      if (!track || total === 0) return;
      function goTo(index) {
        current = (index + total) % total;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        if (dotsEl) {
          dotsEl.querySelectorAll('button').forEach(function(d, i) {
            d.classList.toggle('is-active', i === current);
          });
        }
      }
      if (prevBtn) prevBtn.addEventListener('click', function() { goTo(current - 1); });
      if (nextBtn) nextBtn.addEventListener('click', function() { goTo(current + 1); });
      for (var i = 0; i < total; i++) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.setAttribute('aria-label', 'Go to image ' + (i + 1));
        btn.classList.toggle('is-active', i === 0);
        (function(idx) { btn.addEventListener('click', function() { goTo(idx); }); })(i);
        dotsEl.appendChild(btn);
      }
    })();
  </script>
  <script>
    (function() {
      document.querySelectorAll('#productCarousel .carousel-slide img[data-fallback]').forEach(function(img) {
        img.addEventListener('error', function() {
          var fallback = this.getAttribute('data-fallback');
          if (fallback) { this.src = fallback; this.removeAttribute('data-fallback'); }
        });
      });
    })();
  </script>
  <script src="../assets/mobile-nav.js"></script>
  <script src="../assets/cart.js"></script>
</body>
</html>
